manifest {
    name = "MULL"
    author = "Corentin Molitor"
    homePage = "https://github.com/HCL-HUBL/MULL"
    description = "Nextflow to apply the Lipoprotein(a) prediction model"
    mainScript = "MULL.nf"
    version = "0.1.0"
    nextflowVersion = "24+"
}

executor {
    name = 'local'
    cpus = 25
    memory = "100GB"
}

singularity {
        enabled = false
}

params {
    // Input params:
    samplesheet     = ""
    ref             = ""
    quantiles       = "" //this file is optional
    // Output params:
    outdir          = "./mull_out/"
    outname         = "mull"

    // Fixed params:
    burgess_vcf     = "${projectDir}/data/burgess_43_snps_sorted.vcf.gz"
    burgess_summary = "${projectDir}/data/burgess_43_snps.summary"
    kmer_size       = 31
    rsids_list      = "${projectDir}/data/lpa_model_rsids.tsv"
    kiv2_kmers      = "${projectDir}/data/KIV2_hg38_kmers_6copies_specific.tsv"
    norm_kmers      = "${projectDir}/data/LPA_hg38_kmers_1copies_specific.tsv"
    model           = "${projectDir}/data/SVM_lpa_model.RData"

    tools {
        plink = "/opt/progrs/plink"
        gatk = "/opt/progrs/gatk-4.6.2.0/gatk"
        bcftools = "/opt/progrs/bcftools-1.23.1/bcftools"
        samtools = "/opt/progrs/samtools-1.23/samtools"
        bgzip = "bgzip"
        tabix = "tabix"
        jellyfish = "jellyfish"
    }
}
